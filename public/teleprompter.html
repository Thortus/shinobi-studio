<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShinobiPrompter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --amber: #f0a500;
    --amber-dim: #a06800;
    --amber-glow: rgba(240,165,0,0.12);
    --text: #f0ead8;
    --text-dim: #888;
    --text-muted: #444;
    --red: #e04444;
    --green: #44c98a;
    --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family: 'Segoe UI', system-ui, sans-serif; overflow:hidden; }

  /* ── SETUP SCREEN ─────────────────────────────── */
  #setup {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    width:100%; height:100%; padding:2rem; gap:1.5rem; overflow-y:auto;
  }
  .logo {
    font-size:13px; letter-spacing:0.25em; text-transform:uppercase;
    color:var(--amber); font-weight:600; display:flex; align-items:center; gap:8px;
  }
  .logo-dot { width:6px; height:6px; border-radius:50%; background:var(--amber); display:inline-block; }
  h1 { font-size:clamp(22px,4vw,36px); font-weight:300; letter-spacing:-0.02em; color:var(--text); }
  h1 span { color:var(--amber); font-weight:600; }

  .upload-zone {
    width:100%; max-width:620px; border:1.5px dashed var(--border);
    border-radius:var(--radius); padding:2.5rem 2rem; text-align:center;
    cursor:pointer; transition:all .2s; position:relative; background:var(--surface);
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color:var(--amber); background:var(--amber-glow);
  }
  .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .upload-icon { font-size:32px; margin-bottom:10px; display:block; }
  .upload-title { font-size:15px; font-weight:500; color:var(--text); margin-bottom:4px; }
  .upload-sub { font-size:12px; color:var(--text-dim); }
  .file-types { display:flex; gap:6px; justify-content:center; margin-top:12px; }
  .file-tag {
    font-size:10px; padding:3px 8px; border-radius:4px; font-weight:600;
    letter-spacing:0.05em; text-transform:uppercase;
  }
  .tag-pdf { background:#3a1a1a; color:#e06060; }
  .tag-docx { background:#1a2a3a; color:#6090e0; }
  .tag-txt { background:#1a2a1a; color:#60c060; }
  .tag-paste { background:#2a2a1a; color:var(--amber); }

  .divider { display:flex; align-items:center; gap:12px; width:100%; max-width:620px; }
  .divider-line { flex:1; height:1px; background:var(--border); }
  .divider-text { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.1em; }

  textarea#paste-area {
    width:100%; max-width:620px; height:150px; background:var(--surface);
    border:1.5px solid var(--border); border-radius:var(--radius);
    color:var(--text); font-family:Georgia, serif; font-size:14px; line-height:1.7;
    padding:14px 16px; resize:vertical; transition:border-color .2s; outline:none;
  }
  textarea#paste-area:focus { border-color:var(--amber); }
  textarea#paste-area::placeholder { color:var(--text-muted); }

  .file-name-badge {
    display:none; align-items:center; gap:8px; background:var(--surface2);
    border:1px solid var(--border); padding:8px 14px; border-radius:6px;
    font-size:13px; color:var(--text); max-width:620px; width:100%;
  }
  .file-name-badge.show { display:flex; }
  .fname-icon { color:var(--amber); }
  .fname-text { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fname-clear { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:16px; padding:0 4px; }
  .fname-clear:hover { color:var(--red); }

  .settings-grid {
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;
    width:100%; max-width:620px;
  }
  .setting-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
  .setting-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; margin-bottom:8px; display:flex; justify-content:space-between; }
  .setting-label span { color:var(--amber); font-size:12px; text-transform:none; letter-spacing:0; }
  .setting-slider { width:100%; accent-color:var(--amber); }

  .toggles { display:flex; gap:10px; width:100%; max-width:620px; }
  .toggle-btn {
    flex:1; padding:10px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); color:var(--text-dim); font-size:12px; cursor:pointer;
    transition:all .2s; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .toggle-btn.active { border-color:var(--amber); color:var(--amber); background:var(--amber-glow); }
  .toggle-btn:hover { border-color:var(--border); color:var(--text); }

  #start-btn {
    width:100%; max-width:620px; padding:16px; border-radius:var(--radius);
    background:var(--amber); border:none; color:#000; font-size:16px; font-weight:700;
    letter-spacing:.05em; cursor:pointer; transition:all .2s; text-transform:uppercase;
  }
  #start-btn:hover { background:#ffc030; transform:translateY(-1px); }
  #start-btn:active { transform:translateY(0); }
  #start-btn:disabled { background:var(--text-muted); color:var(--bg); cursor:not-allowed; transform:none; }

  .shortcuts-hint {
    font-size:11px; color:var(--text-muted); text-align:center;
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:620px;
  }
  .key { background:var(--surface2); border:1px solid var(--border); padding:2px 7px; border-radius:4px; font-family:monospace; }

  /* ── PROMPTER SCREEN ──────────────────────────── */
  #prompter {
    display:none; width:100%; height:100%; position:relative; background:var(--bg); overflow:hidden;
  }
  #prompter.active { display:flex; flex-direction:column; }

  /* Focus guide — the line you read from */
  .focus-guide {
    position:absolute; top:33%; left:0; right:0; height:2px;
    background:linear-gradient(90deg, transparent 0%, var(--amber-dim) 20%, var(--amber) 50%, var(--amber-dim) 80%, transparent 100%);
    z-index:10; opacity:0.35; pointer-events:none; transition:opacity .3s;
  }
  #prompter.controls-hidden .focus-guide { opacity:0.15; }

  /* Top fade */
  .fade-top {
    position:absolute; top:0; left:0; right:0; height:22%;
    background:linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
    z-index:8; pointer-events:none;
  }
  /* Bottom fade */
  .fade-bottom {
    position:absolute; bottom:0; left:0; right:0; height:22%;
    background:linear-gradient(to top, var(--bg) 0%, transparent 100%);
    z-index:8; pointer-events:none;
  }

  /* Scroll container */
  #scroll-container {
    width:100%; height:100%; overflow:hidden; cursor:pointer;
  }
  #scroll-inner {
    padding: 50vh 10% 50vh;
    line-height:1.75;
    transition:transform 0ms linear;
  }
  #scroll-inner.mirror { transform:scaleX(-1); }
  
  .prompter-line { 
    margin-bottom:.6em; 
    opacity: 0.25; 
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: left center;
  }
  #scroll-inner.mirror .prompter-line { transform-origin: right center; }
  
  .prompter-line.spotlight { 
    opacity: 1; 
    color: var(--text);
    text-shadow: 0 0 16px rgba(255,255,255,0.15);
    transform: scale(1.02);
  }

  /* Progress bar */
  #progress-bar {
    position:absolute; top:0; left:0; height:2px;
    background:var(--amber); z-index:20; transition:width .1s linear; width:0%;
  }

  /* Controls overlay */
  #controls {
    position:absolute; bottom:0; left:0; right:0; z-index:15;
    padding:16px 20px 20px;
    background:linear-gradient(to top, rgba(0,0,0,.95) 0%, rgba(0,0,0,.6) 70%, transparent 100%);
    transition:opacity .3s, transform .3s; display:flex; flex-direction:column; gap:12px;
  }
  #prompter.controls-hidden #controls { opacity:0; transform:translateY(10px); pointer-events:none; }

  .ctrl-row { display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap; }
  .ctrl-btn {
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
    color:var(--text); padding:10px 16px; border-radius:8px; cursor:pointer;
    font-size:13px; display:flex; align-items:center; gap:6px; transition:all .15s;
    white-space:nowrap;
  }
  .ctrl-btn:hover { background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.25); }
  .ctrl-btn.primary { background:var(--amber); border-color:var(--amber); color:#000; font-weight:700; }
  .ctrl-btn.primary:hover { background:#ffc030; }
  .ctrl-btn.danger:hover { background:rgba(224,68,68,.2); border-color:var(--red); color:var(--red); }

  .speed-display {
    font-size:11px; color:var(--amber); font-weight:600; min-width:40px; text-align:center;
    background:rgba(240,165,0,.1); border:1px solid rgba(240,165,0,.2); padding:4px 8px; border-radius:5px;
  }
  .font-display {
    font-size:11px; color:var(--text-dim); min-width:36px; text-align:center;
  }

  /* Prompter top bar */
  #top-bar {
    position:absolute; top:0; left:0; right:0; z-index:15;
    padding:14px 20px; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom, rgba(0,0,0,.9) 0%, transparent 100%);
    transition:opacity .3s;
  }
  #prompter.controls-hidden #top-bar { opacity:0; pointer-events:none; }
  .top-title { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--amber); }
  .top-status { font-size:11px; color:var(--text-dim); display:flex; gap:12px; align-items:center; }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; animation:pulse 1.5s infinite; }
  .status-dot.paused { background:var(--amber); animation:none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Word count */
  #wc-badge { font-size:11px; color:var(--text-muted); }

  /* Error toast */
  #toast {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(60px);
    background:#2a1414; border:1px solid var(--red); color:var(--red);
    padding:10px 20px; border-radius:8px; font-size:13px; z-index:99;
    transition:transform .3s; pointer-events:none;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }

  /* Loading overlay */
  #loading {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
    align-items:center; justify-content:center; z-index:50; flex-direction:column; gap:12px;
  }
  #loading.show { display:flex; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size:13px; color:var(--text-dim); }

  /* Scrollbar */
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
</style>
</head>
<body>

<!-- ── TOAST ───────────────────────── -->
<div id="toast"></div>

<!-- ── LOADING ─────────────────────── -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Extracting text…</div>
</div>

<!-- ══════════════════════════════════════
     SETUP SCREEN
══════════════════════════════════════ -->
<div id="setup">
  <div class="logo"><span class="logo-dot"></span> ShinobiPrompter</div>
  <h1>Load your <span>script</span></h1>

  <!-- File Drop Zone -->
  <div class="upload-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".txt,.pdf,.doc,.docx" />
    <span class="upload-icon">📄</span>
    <div class="upload-title">Drop your script file here</div>
    <div class="upload-sub">or click to browse</div>
    <div class="file-types">
      <span class="file-tag tag-pdf">PDF</span>
      <span class="file-tag tag-docx">DOCX</span>
      <span class="file-tag tag-txt">TXT</span>
    </div>
  </div>

  <!-- File loaded badge -->
  <div class="file-name-badge" id="file-badge">
    <span class="fname-icon">✓</span>
    <span class="fname-text" id="fname-text"></span>
    <button class="fname-clear" id="fname-clear">✕</button>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">or paste text</div>
    <div class="divider-line"></div>
  </div>

  <textarea id="paste-area" placeholder="Paste your script, outline, or talking points here…"></textarea>

  <!-- Settings -->
  <div class="settings-grid">
    <div class="setting-card">
      <div class="setting-label">Speed <span id="speed-val">3</span></div>
      <input type="range" class="setting-slider" id="speed-slider" min="1" max="10" value="3">
    </div>
    <div class="setting-card">
      <div class="setting-label">Font Size <span id="fontsize-val">48px</span></div>
      <input type="range" class="setting-slider" id="fontsize-slider" min="20" max="96" step="2" value="48">
    </div>
    <div class="setting-card">
      <div class="setting-label">Width <span id="width-val">72%</span></div>
      <input type="range" class="setting-slider" id="width-slider" min="40" max="95" step="5" value="72">
    </div>
  </div>

  <!-- Toggles -->
  <div class="toggles">
    <button class="toggle-btn" id="toggle-mirror">🔁 Mirror Mode</button>
    <button class="toggle-btn" id="toggle-guide">🎯 Focus Line</button>
    <button class="toggle-btn active" id="toggle-dark">🌑 Dark Theme</button>
  </div>

  <button id="start-btn" disabled>▶ START PROMPTER</button>

  <div class="shortcuts-hint">
    <span><span class="key">SPACE</span> Play/Pause</span>
    <span><span class="key">↑ ↓</span> Speed</span>
    <span><span class="key">[ ]</span> Font size</span>
    <span><span class="key">M</span> Mirror</span>
    <span><span class="key">F</span> Fullscreen</span>
    <span><span class="key">R</span> Restart</span>
    <span><span class="key">ESC</span> Back to setup</span>
  </div>
</div>

<!-- ══════════════════════════════════════
     PROMPTER SCREEN
══════════════════════════════════════ -->
<div id="prompter">
  <div id="progress-bar"></div>

  <div id="top-bar">
    <div class="top-title">⬥ ShinobiPrompter</div>
    <div class="top-status">
      <div id="status-dot" class="status-dot paused"></div>
      <span id="status-text">Paused</span>
      <span id="wc-badge"></span>
    </div>
  </div>

  <div class="focus-guide" id="focus-guide"></div>
  <div class="fade-top"></div>
  <div class="fade-bottom"></div>

  <div id="scroll-container">
    <div id="scroll-inner"></div>
  </div>

  <div id="controls">
    <div class="ctrl-row">
      <button class="ctrl-btn danger" id="btn-back" title="Back to setup (ESC)">✕ Setup</button>

      <button class="ctrl-btn" id="btn-slower" title="Slower (↓)">⟵ Slower</button>
      <div class="speed-display" id="live-speed">3×</div>
      <button class="ctrl-btn" id="btn-faster" title="Faster (↑)">Faster ⟶</button>

      <button class="ctrl-btn primary" id="btn-play" title="Play / Pause (SPACE)">▶ Play</button>

      <button class="ctrl-btn" id="btn-smaller" title="Smaller text ([)">A−</button>
      <div class="font-display" id="live-font">48</div>
      <button class="ctrl-btn" id="btn-bigger" title="Bigger text (])">A+</button>

      <button class="ctrl-btn" id="btn-mirror" title="Mirror (M)">⇄ Mirror</button>
      <button class="ctrl-btn" id="btn-restart" title="Restart (R)">↺ Restart</button>
      <button class="ctrl-btn" id="btn-fs" title="Fullscreen (F)">⛶ Full</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCRIPTS
══════════════════════════════════════ -->
<script>
// ── State ─────────────────────────────────────────
const state = {
  text: '',
  speed: 3,
  fontSize: 48,
  textWidth: 72,
  mirror: false,
  guide: true,
  playing: false,
  scrollY: 0,
  raf: null,
  controlsTimer: null,
  totalHeight: 0,
};

// ── Elements ──────────────────────────────────────
const $ = id => document.getElementById(id);
const setupEl     = $('setup');
const prompterEl  = $('prompter');
const scrollInner = $('scroll-inner');
const scrollCont  = $('scroll-container');
const progressBar = $('progress-bar');
const playBtn     = $('btn-play');
const statusDot   = $('status-dot');
const statusText  = $('status-text');
const liveSpeed   = $('live-speed');
const liveFont    = $('live-font');
const focusGuide  = $('focus-guide');
const wcBadge     = $('wc-badge');
const loading     = $('loading');
const toast       = $('toast');

// ── Utility ───────────────────────────────────────
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}
function showLoading() { loading.classList.add('show'); }
function hideLoading() { loading.classList.remove('show'); }

function wordCount(t) {
  return t.trim().split(/\s+/).filter(Boolean).length;
}
function readingTime(words, speed) {
  const wpm = 120 + (speed - 1) * 20;
  return Math.ceil(words / wpm);
}

// ── Settings sync ─────────────────────────────────
$('speed-slider').addEventListener('input', e => {
  state.speed = +e.target.value;
  $('speed-val').textContent = state.speed;
});
$('fontsize-slider').addEventListener('input', e => {
  state.fontSize = +e.target.value;
  $('fontsize-val').textContent = state.fontSize + 'px';
});
$('width-slider').addEventListener('input', e => {
  state.textWidth = +e.target.value;
  $('width-val').textContent = state.textWidth + '%';
});

$('toggle-mirror').addEventListener('click', function() {
  state.mirror = !state.mirror;
  this.classList.toggle('active', state.mirror);
});
$('toggle-guide').addEventListener('click', function() {
  state.guide = !state.guide;
  this.classList.toggle('active', state.guide);
  focusGuide.style.display = state.guide ? '' : 'none';
});

// ── Text loading ──────────────────────────────────
let fileText = '';

function setText(t) {
  fileText = t.trim();
  const combined = (fileText + '\n' + $('paste-area').value).trim();
  state.text = combined;
  $('start-btn').disabled = !state.text;
  if (fileText) {
    const wc = wordCount(fileText);
    $('fname-text').textContent += ` — ${wc} words`;
  }
}

$('paste-area').addEventListener('input', function() {
  const combined = (fileText + '\n' + this.value).trim();
  state.text = combined;
  $('start-btn').disabled = !state.text;
});

// File input
$('file-input').addEventListener('change', e => handleFile(e.target.files[0]));

// Drag & drop
const dz = $('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'); });
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

$('fname-clear').addEventListener('click', () => {
  fileText = '';
  $('file-input').value = '';
  $('file-badge').classList.remove('show');
  $('fname-text').textContent = '';
  state.text = $('paste-area').value.trim();
  $('start-btn').disabled = !state.text;
});

async function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  showLoading();
  try {
    let text = '';
    if (ext === 'txt') {
      text = await file.text();
    } else if (ext === 'pdf') {
      text = await extractPDF(file);
    } else if (ext === 'doc' || ext === 'docx') {
      text = await extractDOCX(file);
    } else {
      throw new Error('Unsupported file type. Use PDF, DOCX, or TXT.');
    }
    if (!text.trim()) throw new Error('No text found in file.');
    $('fname-text').textContent = file.name;
    $('file-badge').classList.add('show');
    setText(text);
  } catch (err) {
    showToast('⚠ ' + err.message);
  } finally {
    hideLoading();
  }
}

async function extractPDF(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  if (!pdfjsLib) throw new Error('PDF.js not loaded. Check your connection.');
  pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js`;
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + '\n\n';
  }
  return text;
}

async function extractDOCX(file) {
  if (!window.mammoth) throw new Error('Mammoth.js not loaded. Check your connection.');
  const ab = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: ab });
  return result.value;
}

// ── Start prompter ────────────────────────────────
$('start-btn').addEventListener('click', startPrompter);

function startPrompter() {
  if (!state.text) return;

  // Build HTML content
  const lines = state.text.split('\n').filter(l => l.trim());
  scrollInner.innerHTML = lines.map(l => `<p class="prompter-line">${escHtml(l)}</p>`).join('');

  // Apply settings
  scrollInner.style.fontSize = state.fontSize + 'px';
  scrollInner.style.maxWidth = state.textWidth + '%';
  scrollInner.style.margin = '0 auto';
  scrollInner.style.fontFamily = 'Georgia, "Times New Roman", serif';
  scrollInner.style.color = 'var(--text)';
  scrollInner.style.lineHeight = '1.8';
  if (state.mirror) scrollInner.classList.add('mirror');
  else scrollInner.classList.remove('mirror');

  focusGuide.style.display = state.guide ? '' : 'none';

  // Word count
  const wc = wordCount(state.text);
  const rt = readingTime(wc, state.speed);
  wcBadge.textContent = `${wc.toLocaleString()} words · ~${rt} min`;

  // Reset scroll
  state.scrollY = 0;
  scrollCont.scrollTop = 0;
  state.playing = false;

  updateSpeedUI();
  updateFontUI();
  updatePlayUI();

  setupEl.style.display = 'none';
  prompterEl.classList.add('active');

  // Show controls initially
  showControls();
  document.addEventListener('keydown', keyHandler);
  scrollCont.addEventListener('click', togglePlay);
  prompterEl.addEventListener('mousemove', showControls);
  prompterEl.addEventListener('touchstart', showControls);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Scroll engine ─────────────────────────────────
function speedToPixelsPerSec(s) {
  // Speed 1 = 40px/s, Speed 10 = 400px/s
  return 30 + (s - 1) * 42;
}

let lastTime = null;
function scrollStep(ts) {
  if (!state.playing) return;
  if (lastTime === null) lastTime = ts;
  const dt = (ts - lastTime) / 1000;
  lastTime = ts;

  const pps = speedToPixelsPerSec(state.speed);
  state.scrollY += pps * dt;

  const maxScroll = scrollInner.scrollHeight - scrollCont.clientHeight;
  if (state.scrollY >= maxScroll) {
    state.scrollY = maxScroll;
    scrollCont.scrollTop = state.scrollY;
    setPlaying(false);
    updateProgress();
    updateHighlighting();
    return;
  }
  scrollCont.scrollTop = state.scrollY;
  updateProgress();
  updateHighlighting();
  state.raf = requestAnimationFrame(scrollStep);
}

function updateHighlighting() {
  const focusY = window.innerHeight * 0.33; // 33% from top is where our guide sits
  const lines = document.querySelectorAll('.prompter-line');
  
  lines.forEach(line => {
    const rect = line.getBoundingClientRect();
    const centerY = rect.top + (rect.height / 2);
    const dist = Math.abs(centerY - focusY);
    
    // If the center of the text line is within ~60px of the guide bar, it lights up
    if (dist < 80) {
      line.classList.add('spotlight');
    } else {
      line.classList.remove('spotlight');
    }
  });
}

function updateProgress() {
  const maxScroll = scrollInner.scrollHeight - scrollCont.clientHeight;
  const pct = maxScroll > 0 ? (state.scrollY / maxScroll) * 100 : 0;
  progressBar.style.width = Math.min(pct, 100).toFixed(2) + '%';
}

// ── Play / Pause ──────────────────────────────────
function setPlaying(v) {
  state.playing = v;
  if (!v) {
    cancelAnimationFrame(state.raf);
    lastTime = null;
  } else {
    state.raf = requestAnimationFrame(scrollStep);
  }
  updatePlayUI();
}

function togglePlay() {
  setPlaying(!state.playing);
  showControls();
}

function updatePlayUI() {
  playBtn.textContent = state.playing ? '⏸ Pause' : '▶ Play';
  playBtn.className = state.playing ? 'ctrl-btn danger' : 'ctrl-btn primary';
  statusDot.className = 'status-dot' + (state.playing ? '' : ' paused');
  statusText.textContent = state.playing ? 'Rolling' : 'Paused';
}

// ── Speed controls ────────────────────────────────
function changeSpeed(delta) {
  state.speed = Math.min(10, Math.max(1, state.speed + delta));
  updateSpeedUI();
  showControls();
}
function updateSpeedUI() { liveSpeed.textContent = state.speed + '×'; }

$('btn-faster').addEventListener('click', () => changeSpeed(1));
$('btn-slower').addEventListener('click', () => changeSpeed(-1));
$('btn-play').addEventListener('click', e => { e.stopPropagation(); togglePlay(); });

// ── Font controls ─────────────────────────────────
function changeFontSize(delta) {
  state.fontSize = Math.min(120, Math.max(16, state.fontSize + delta));
  scrollInner.style.fontSize = state.fontSize + 'px';
  updateFontUI();
  showControls();
}
function updateFontUI() { liveFont.textContent = state.fontSize; }

$('btn-bigger').addEventListener('click', e => { e.stopPropagation(); changeFontSize(4); });
$('btn-smaller').addEventListener('click', e => { e.stopPropagation(); changeFontSize(-4); });

// ── Mirror ────────────────────────────────────────
$('btn-mirror').addEventListener('click', e => {
  e.stopPropagation();
  state.mirror = !state.mirror;
  scrollInner.classList.toggle('mirror', state.mirror);
  $('btn-mirror').classList.toggle('active', state.mirror);
  showControls();
});

// ── Restart ───────────────────────────────────────
$('btn-restart').addEventListener('click', e => {
  e.stopPropagation();
  setPlaying(false);
  state.scrollY = 0;
  scrollCont.scrollTop = 0;
  lastTime = null;
  updateProgress();
  showControls();
});

// ── Back to setup ─────────────────────────────────
$('btn-back').addEventListener('click', e => {
  e.stopPropagation();
  exitPrompter();
});

function exitPrompter() {
  setPlaying(false);
  document.removeEventListener('keydown', keyHandler);
  scrollCont.removeEventListener('click', togglePlay);
  prompterEl.removeEventListener('mousemove', showControls);
  prompterEl.removeEventListener('touchstart', showControls);
  clearTimeout(state.controlsTimer);
  prompterEl.classList.remove('active', 'controls-hidden');
  setupEl.style.display = '';
  if (document.fullscreenElement) document.exitFullscreen();
}

// ── Fullscreen ────────────────────────────────────
$('btn-fs').addEventListener('click', e => {
  e.stopPropagation();
  if (!document.fullscreenElement) {
    prompterEl.requestFullscreen().catch(() => showToast('Fullscreen not available'));
  } else {
    document.exitFullscreen();
  }
  showControls();
});

// ── Controls hide/show ────────────────────────────
function showControls() {
  prompterEl.classList.remove('controls-hidden');
  clearTimeout(state.controlsTimer);
  state.controlsTimer = setTimeout(() => {
    if (state.playing) prompterEl.classList.add('controls-hidden');
  }, 3000);
}

// ── Keyboard ──────────────────────────────────────
function keyHandler(e) {
  const tag = document.activeElement.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT') return;
  switch (e.key) {
    case ' ':       e.preventDefault(); togglePlay(); break;
    case 'ArrowUp':   e.preventDefault(); changeSpeed(1); break;
    case 'ArrowDown': e.preventDefault(); changeSpeed(-1); break;
    case ']':       changeFontSize(4); break;
    case '[':       changeFontSize(-4); break;
    case 'm': case 'M':
      state.mirror = !state.mirror;
      scrollInner.classList.toggle('mirror', state.mirror);
      showControls(); break;
    case 'f': case 'F':
      $('btn-fs').click(); break;
    case 'r': case 'R':
      $('btn-restart').click(); break;
    case 'Escape':
      exitPrompter(); break;
  }
}

// ── Touch scroll sync (drag to manually scroll) ───
let touchStartY = null;
scrollCont.addEventListener('touchstart', e => {
  if (e.touches.length === 1) touchStartY = e.touches[0].clientY;
}, { passive: true });
scrollCont.addEventListener('touchmove', e => {
  if (touchStartY === null) return;
  const dy = touchStartY - e.touches[0].clientY;
  state.scrollY = Math.max(0, state.scrollY + dy);
  scrollCont.scrollTop = state.scrollY;
  touchStartY = e.touches[0].clientY;
  updateProgress();
}, { passive: true });
scrollCont.addEventListener('touchend', () => { touchStartY = null; });

// ── Manual scroll wheel ───────────────────────────
scrollCont.addEventListener('wheel', e => {
  e.preventDefault();
  setPlaying(false);
  state.scrollY = Math.max(0, state.scrollY + e.deltaY);
  scrollCont.scrollTop = state.scrollY;
  updateProgress();
  showControls();
}, { passive: false });

// ADD ONLY THIS BLOCK AT THE END OF THE SCRIPT
window.addEventListener('load', () => {
  const preloaded = localStorage.getItem('prompterScript');
  if (preloaded) {
    const pasteArea = document.getElementById('paste-area');
    if (pasteArea) {
      pasteArea.value = preloaded;
      pasteArea.dispatchEvent(new Event('input', { bubbles: true }));
      
      // Auto-start the prompter if loaded from the video dashboard
      setTimeout(() => {
        const startBtn = document.getElementById('start-btn');
        if (startBtn && !startBtn.disabled) startBtn.click();
      }, 50);
    }
    localStorage.removeItem('prompterScript');
  }
});
</script>
</body>
</html>
